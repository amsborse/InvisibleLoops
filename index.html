<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var key = "theme";
          var stored = localStorage.getItem(key);
          var theme;
          if (stored === "light" || stored === "dayThinking" || stored === "day") theme = "light";
          else if (stored === "dark" || stored === "nightReading" || stored === "night") theme = "dark";
          else theme = "dark"; // default to dark per product spec

          var root = document.documentElement;
          root.setAttribute("data-theme", theme);
          root.classList.toggle("dark", theme === "dark");
          root.setAttribute("data-theme-mode", theme === "dark" ? "nightReading" : "dayThinking");
        } catch (e) {
          // no-op
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invisible Loops</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
